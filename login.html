<!DOCTYPE html>
<html>
<head>
    <title>Login - CryptoX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #111827, #1f2937);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: #1f2937;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            color: white;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
            color: #9ca3af;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
            background: #374151;
            color: white;
        }

        .form-group input:focus {
            border: 1px solid #3b82f6;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #2563eb;
        }

        .logo {
            text-align: center;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="login-container">

    <div class="logo">💰 CryptoX</div>
    <div class="subtitle">Welcome back! Please login.</div>

    <form onsubmit="loginUser(event)">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

</div>

<script>
function loginUser(e) {
    e.preventDefault();
    localStorage.setItem("loggedIn", true);
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
