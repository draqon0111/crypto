<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Dashboard</title>
<link rel="stylesheet" href="stylee.css">
</head>

<body>
<div id="sidebar-container"></div>
<!-- Main Dashboard -->
<!-- BTC Card -->
<section class="card">
    <div class="card-header">
        <h2>BTC/USD</h2>
        <div class="price-box">
            <h3 id="btcPrice">$43,256.00</h3>
            <span id="btcChange" class="positive">+0%</span>
        </div>
    </div>

    <div class="candles" id="btcCandles">
        <!-- Candles generated by JS -->
    </div>
</section>

<!-- ETH Card -->
<section class="card">
    <div class="card-header">
        <h2>ETH/USD</h2>
        <div class="price-box">
            <h3 id="ethPrice">$2,284.50</h3>
            <span id="ethChange" class="positive">+0%</span>
        </div>
    </div>

    <div class="candles" id="ethCandles">
        <!-- Candles generated by JS -->
    </div>
</section>

    <!-- Asset Allocation -->
    <section class="card">
        <h2>Asset Allocation</h2>

        <div class="donut-container">
            <div class="donut"></div>
        </div>

        <div class="legend">
            <span class="dot btc"></span> BTC 40%
        </div>
    </section>

    <!-- Summary Section -->
    <section class="summary">

        <div class="summary-box">
            <h3>💰 Total Balance</h3>
            <h2>$24,580.00</h2>
            <p class="positive">+5.2% this month</p>
        </div>

        <div class="summary-box">
            <h3>📈 Total Profit</h3>
            <h2>$3,420.00</h2>
            <p class="positive">+12.4%</p>
        </div>

        <div class="summary-box">
            <h3>⏳ Pending Orders</h3>
            <h2>08</h2>
            <p class="neutral">2 awaiting confirmation</p>
        </div>

    </section>

    <!-- Transactions Box -->
    <section class="transactions-box">
       <h3 id="ethPrice">$2,284.50</h3>
<span id="ethChange" class="positive">+0%</span>

<div class="donut" id="donutChart"></div>

<h2 id="totalBalance">$24,580.00</h2>
<h2 id="totalProfit">$3,420.00</h2>
<h2 id="pendingOrders">08</h2>

<h2 id="totalTransactions">156</h2>
<p id="lastUpdated" class="neutral">Last updated</p>
    </section>

</main>
<script>
fetch("sidebar.html")
.then(res => res.text())
.then(data => {
    document.getElementById("sidebar-container").innerHTML = data;

    // Active Link Highlight
    const currentPage = window.location.pathname.split("/").pop();
    const links = document.querySelectorAll(".sidebar a");

    links.forEach(link => {
        if (link.getAttribute("href") === currentPage) {
            link.classList.add("active");
        }
    });

    // Login / Logout Toggle
    const authLink = document.getElementById("authLink");
    const isLoggedIn = localStorage.getItem("loggedIn");

    if (isLoggedIn) {
        authLink.innerHTML = "🚪 Logout";
        authLink.href = "#";
        authLink.onclick = function () {
            localStorage.removeItem("loggedIn");
            window.location.href = "login.html";
        };
    }
});
</script>
<script>
document.addEventListener("DOMContentLoaded", function() {

    let btcPrice = 43256;
    let ethPrice = 2284.50;

    function randomPercent() {
        return (Math.random() * 4 - 2); // -2% to +2%
    }

    function updatePrice(symbol) {

        let change = randomPercent();

        if (symbol === "btc") {
            btcPrice *= (1 + change / 100);
            document.getElementById("btcPrice").innerText =
                "$" + btcPrice.toFixed(2);
            updateChange("btcChange", change);
            generateCandles("btcCandles");
        }

        if (symbol === "eth") {
            ethPrice *= (1 + change / 100);
            document.getElementById("ethPrice").innerText =
                "$" + ethPrice.toFixed(2);
            updateChange("ethChange", change);
            generateCandles("ethCandles");
        }
    }

    function updateChange(id, change) {
        let element = document.getElementById(id);

        if (change >= 0) {
            element.className = "positive";
            element.innerText = "+" + change.toFixed(2) + "%";
        } else {
            element.className = "negative";
            element.innerText = change.toFixed(2) + "%";
        }
    }

    function generateCandles(containerId) {

        let container = document.getElementById(containerId);
        container.innerHTML = "";

        for (let i = 0; i < 9; i++) {

            let candle = document.createElement("div");
            candle.classList.add("candle");

            let height = Math.floor(Math.random() * 80) + 40;
            candle.style.height = height + "px";

            if (Math.random() > 0.5) {
                candle.classList.add("green");
            } else {
                candle.classList.add("red");
            }

            container.appendChild(candle);
        }
    }

    function updateMarket() {
        updatePrice("btc");
        updatePrice("eth");
    }

    updateMarket();
    setInterval(updateMarket, 3000);

});
</script>
<script>
document.addEventListener("DOMContentLoaded", function() {

    let ethPrice = 2284.50;
    let baseInvestment = 20000;
    let transactions = 156;
    let pending = 8;

    function randomPercent() {
        return (Math.random() * 4 - 2); // -2% to +2%
    }

    function updateETH() {

        let change = randomPercent();
        ethPrice *= (1 + change / 100);

        document.getElementById("ethPrice").innerText =
            "$" + ethPrice.toFixed(2);

        let changeEl = document.getElementById("ethChange");

        if (change >= 0) {
            changeEl.className = "positive";
            changeEl.innerText = "+" + change.toFixed(2) + "%";
        } else {
            changeEl.className = "negative";
            changeEl.innerText = change.toFixed(2) + "%";
        }

        generateCandles();
    }

    function generateCandles() {
        let container = document.getElementById("ethCandles");
        container.innerHTML = "";

        for (let i = 0; i < 8; i++) {
            let candle = document.createElement("div");
            candle.classList.add("candle");

            let height = Math.floor(Math.random() * 80) + 40;
            candle.style.height = height + "px";

            candle.classList.add(Math.random() > 0.5 ? "green" : "red");
            container.appendChild(candle);
        }
    }

    function updateSummary() {

        let balance = ethPrice * 10; // demo calculation
        let profit = balance - baseInvestment;

        document.getElementById("totalBalance").innerText =
            "$" + balance.toFixed(2);

        document.getElementById("totalProfit").innerText =
            "$" + profit.toFixed(2);

        pending = Math.floor(Math.random() * 10);
        document.getElementById("pendingOrders").innerText =
            pending;

        transactions += Math.floor(Math.random() * 3);
        document.getElementById("totalTransactions").innerText =
            transactions;

        document.getElementById("lastUpdated").innerText =
            "Last updated " + new Date().toLocaleTimeString();
    }

    function updateDonut() {
        let btcPercent = Math.floor(Math.random() * 60) + 20;
        let ethPercent = 100 - btcPercent;

        document.getElementById("donutChart").style.background =
            `conic-gradient(
                #f7931a 0% ${btcPercent}%,
                #627eea ${btcPercent}% 100%
            )`;
    }

    function updateDashboard() {
        updateETH();
        updateSummary();
        updateDonut();
    }

    updateDashboard();
    setInterval(updateDashboard, 4000);

});
</script>
</body>
</html>
